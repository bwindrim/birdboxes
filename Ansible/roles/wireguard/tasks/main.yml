---
- name: Install WireGuard packages
  ansible.builtin.package:
    name: "{{ wireguard_packages }}"
    state: present
  become: yes

- name: Ensure /etc/wireguard directory exists
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    mode: '0700'

- name: Generate private key if not present
  ansible.builtin.shell: wg genkey | tee /etc/wireguard/private.key
  args:
    creates: /etc/wireguard/private.key
  register: private_key_generation

- name: Read private key
  ansible.builtin.slurp:
    src: /etc/wireguard/private.key
  register: private_key

- name: Generate public key from private key
  ansible.builtin.command: wg pubkey
  args:
    stdin: "{{ private_key['content'] | b64decode }}"
  register: public_key
  changed_when: private_key_generation.changed | default(false)

- name: Configure WireGuard interface
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
  notify: Restart WireGuard

- name: Ensure systemd drop-in directory exists for wg-quick@wg0
  ansible.builtin.file:
    path: /etc/systemd/system/wg-quick@wg0.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure wg-quick@wg0 to start after clipper.service
  ansible.builtin.copy:
    dest: /etc/systemd/system/wg-quick@wg0.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Wants=clipper.service
      After=clipper.service

- name: Enable and start wg-quick@wg0 service
  ansible.builtin.systemd:
    name: wg-quick@wg0
    state: started
    enabled: yes
    daemon_reload: yes

- name: Deploy systemd service for DNS re-resolve
  ansible.builtin.template:
    src: wireguard-reresolve-dns.service.j2
    dest: "/etc/systemd/system/wireguard-reresolve-dns.service"
    owner: root
    group: root
    mode: '0644'

- name: Deploy systemd timer for periodic DNS re-resolve
  ansible.builtin.template:
    src: wireguard-reresolve-dns.timer.j2
    dest: "/etc/systemd/system/wireguard-reresolve-dns.timer"
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd and start WireGuard DNS re-resolve
  ansible.builtin.systemd:
    name: wireguard-reresolve-dns.timer
    state: started
    enabled: yes
    daemon_reload: yes
